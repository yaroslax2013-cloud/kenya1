<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chats</title>

<style>
body{
    margin:0;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
}

/* phone */
.app{
    width:360px;
    height:640px;
    background:#000;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    display:flex;
    flex-direction:column;
}

/* header */
.header{
    padding:18px 15px 10px;
    font-size:22px;
    font-weight:bold;
    color:white;
}

/* chat box */
.chat-box{
    display:none;
    flex-direction:column;
    height:100%;
    padding:15px;
    overflow-y:auto;
    box-sizing:border-box;
}
    
.chat-box {
    scrollbar-width: none; /* Firefox */
}

.chat-box::-webkit-scrollbar {
    display: none; /* Chrome, Safari */
}

.msg{
    background:#1f2937;
    padding:10px 14px;
    border-radius:10px;
    margin:6px 0;
    max-width:80%;
    font-size:14px;
    color:white;
    animation:fadeIn 0.3s ease forwards;
}

.right{
    background:#25D366;
    color:black;
    margin-left:auto;
}

.image{
    width:100%;
    border-radius:10px;
    margin-top:6px;
}

.btn{
    display:none;
    background:#25D366;
    color:black;
    text-align:center;
    padding:16px;
    border-radius:14px;
    margin-top:18px;
    font-weight:bold;
    text-decoration:none;
    font-size:16px;
    animation:pulse 1.2s infinite;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.notice{
    font-size:12px;
    color:#9ca3af;
    margin-top:12px;
    text-align:center;
    width:100%;
    opacity:0.8;
    animation: fadeIn 0.6s ease;
}

.notice{
    animation: fadeIn 0.6s ease;
}

</style>
</head>

<body>

<div class="app">

    <div class="header">Private chat</div>

    <div class="chat-box" id="chatBox">
        <div id="messages"></div>
    </div>

</div>

<script>

const chatBox = document.getElementById("chatBox");
const messages = document.getElementById("messages");

let state = { running:false };

function delay(ms){
    return new Promise(r => setTimeout(r, ms));
}

function scroll(){
    chatBox.scrollTop = chatBox.scrollHeight;
}

function add(text, side="left"){
    const div = document.createElement("div");
    div.className = "msg " + (side==="right" ? "right":"");
    div.innerHTML = text;
    messages.appendChild(div);
    scroll();
}

/* CORE FLOW */
async function start(){

    if(state.running) return;
    state.running = true;

    chatBox.style.display = "flex";

    add("bro I wasn’t going to tell anyone this...");
    await delay(1200);

    add("but I just made money again today 😳");
    await delay(1200);

    add("what do you mean?","right");
    await delay(1000);

    add("I started with only 1850 TZS");
    await delay(1200);

    add("look at this 👇");
    await delay(800);

    add('<img src="win.jpg" class="image">');
    await delay(1500);

    add("is this even real?","right");
    await delay(1000);

    add("I thought the same at first");
    await delay(1200);

    add("but I already withdrew twice");
    await delay(1200);

    add("they don’t let everyone in");
    await delay(1200);

    add("I can send you access link if you want");
    await delay(1200);

    add("hmm send it","right");
    await delay(1000);

    add("ok but don’t share it 👇");

    /* CTA */
    const btn = document.createElement("a");
    btn.href = "{offer}";
    btn.className = "btn";
    btn.innerText = "GET ACCESS";

    btn.onclick = () => {
        if(window.clicked) return false;
        window.clicked = true;
    };

    messages.appendChild(btn);

    setTimeout(() => {
        btn.style.display = "block";
        scroll();
    }, 600);

    add('<div class="notice">limited spots • only for active users</div>');
}

window.onload = () => {
    setTimeout(start, 1200);
};

</script>

</body>
</html>
